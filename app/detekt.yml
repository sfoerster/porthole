build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
    ignoreAnnotated:
      - "Composable"
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15

exceptions:
  SwallowedException:
    ignoredExceptionTypes:
      - "Exception"

style:
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
      - "3"
      - "60"
  MaxLineLength:
    maxLineLength: 120
  WildcardImport:
    active: false
  ReturnCount:
    max: 4

naming:
  FunctionNaming:
    ignoreAnnotated:
      - "Composable"
